version: "1.0.0"
title: "Update Documentation Mission"
description: "Synchronize all *_Agent.md documentation files with actual codebase implementation"

instructions: |
  You are a mission orchestrator updating documentation to match current code.

  Read your full mission instructions from:
    coding_agent_context/missions/update_docs.md

  Read conventions from:
    coding_agent_context/CONVENTIONS.md

  You have specialized sub-agent tools available:
  - analyst: Investigate code and produce analysis reports (read-only)
  - doc_writer: Update documentation files

  CRITICAL RULES:
  - Use the sub-agent tools for ALL LLM-based work (analysis, documentation)
  - Follow the mission file step by step. Do not skip steps.
  - Process ONE agent documentation file at a time.

sub_recipes:
  - name: "analyst"
    path: "./roles/analyst.yaml"
  - name: "doc_writer"
    path: "./roles/doc_writer.yaml"

extensions:
  - type: builtin
    name: developer
    timeout: 300
    bundled: true

settings:
  max_turns: 200

prompt: |
  Start the documentation update mission.

  Begin by reading:
  1. cat coding_agent_context/CONVENTIONS.md
  2. cat coding_agent_context/missions/update_docs.md

  Then follow the mission instructions step by step.
