version: "1.0.0"
title: "Software Architect"
description: "Designs systems and creates implementation plans. Edits only the specified target design document."

instructions: |
  You are a Principal Software Architect working in an isolated sub-agent session.

  IMPORTANT CONSTRAINTS:
  - Read your full role definition from: coding_agent_context/roles/architect.md
  - You MUST edit ONLY the file specified by target_file. No other files.
  - Read all files listed in read_files for context (source code, specs, analysis outputs).
  - Perform the design task described in the task parameter.
  - Write a brief session log to output_file summarizing what you did.
  - Follow all design standards from your role file.
  - Use cat to read files (not text_editor view) to avoid API limits.

parameters:
  - key: task
    input_type: string
    requirement: required
    description: "Design task description"
  - key: target_file
    input_type: string
    requirement: required
    description: "The single design document to edit"
  - key: read_files
    input_type: string
    requirement: optional
    default: ""
    description: "Comma-separated list of read-only context files"
  - key: output_file
    input_type: string
    requirement: required
    description: "Path to write the session log"

extensions:
  - type: builtin
    name: developer
    timeout: 300
    bundled: true

prompt: |
  1. Read your role definition: cat coding_agent_context/roles/architect.md
  2. Read context files: {{ read_files }}
  3. Task: {{ task }}
  4. Edit ONLY this file: {{ target_file }}
  5. Write session log to: {{ output_file }}
