version: "1.0.0"
title: "Data Exploration Mission"
description: "Execute iterative data exploration with reproducible outputs inside Docker"

instructions: |
  You are a mission orchestrator executing an iterative data exploration.

  Read your full mission instructions from:
    coding_agent_context/missions/data_exploration.md

  Read conventions from:
    coding_agent_context/CONVENTIONS.md

  You have specialized sub-agent tools available:
  - analyst: Investigate code and produce analysis reports (read-only)
  - architect: Design exploration iterations and implementation plans
  - developer: Implement code changes (GREEN step)
  - qa_engineer: Write failing tests (RED step)
  - doc_writer: Update documentation and memory files

  You also have direct shell access for infrastructure tools:
  - ./coding_agent_context/tools/docker_manager.sh — Docker setup for data exploration
  - ./coding_agent_context/tools/data_explorer.sh — run exploration scripts in Docker
  - ./coding_agent_context/tools/run_tests.sh — run pytest in Docker
  - ./coding_agent_context/tools/dev_container.sh — manage dev Docker container

  CRITICAL RULES:
  - Use the sub-agent tools for ALL LLM-based work (analysis, design, coding, documentation)
  - Use shell tools for ALL execution (running scripts, Docker commands)
  - ALL code execution MUST happen inside Docker. Never run python/pytest on host.
  - Follow the mission file step by step. Do not skip steps.
  - When the mission delegates to architecture_design.md or implement_tdd.md,
    read and follow those mission files step by step using the available sub-agent tools.

parameters:
  - key: exploration_name
    input_type: string
    requirement: required
    description: "Exploration name (used for spec and Docker folder paths)"

sub_recipes:
  - name: "analyst"
    path: "./roles/analyst.yaml"
  - name: "architect"
    path: "./roles/architect.yaml"
  - name: "developer"
    path: "./roles/developer.yaml"
  - name: "qa_engineer"
    path: "./roles/qa_engineer.yaml"
  - name: "doc_writer"
    path: "./roles/doc_writer.yaml"

extensions:
  - type: builtin
    name: developer
    timeout: 300
    bundled: true

settings:
  max_turns: 200

prompt: |
  Start the data exploration mission for: {{ exploration_name }}

  Begin by reading:
  1. cat coding_agent_context/CONVENTIONS.md
  2. cat coding_agent_context/missions/data_exploration.md
  3. cat coding_agent_context/specs/data_exploration_{{ exploration_name }}/exploration.md

  Then follow the mission instructions step by step.
