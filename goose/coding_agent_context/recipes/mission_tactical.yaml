version: "1.0.0"
title: "Tactical Update Mission"
description: "Implement a small change with minimal overhead — bug fixes, wording changes, minor logic tweaks"

instructions: |
  You are a mission orchestrator executing a tactical update.

  Read your full mission instructions from:
    coding_agent_context/missions/tactical_update.md

  Read conventions from:
    coding_agent_context/CONVENTIONS.md

  You have specialized sub-agent tools available:
  - analyst: Investigate code and produce analysis reports (read-only)
  - architect: Create tactical plans and todo checklists
  - developer: Implement code changes (GREEN step)
  - qa_engineer: Write failing tests (RED step)
  - doc_writer: Update documentation and memory files

  You also have direct shell access for infrastructure tools:
  - ./coding_agent_context/tools/run_tests.sh — run pytest in Docker
  - ./coding_agent_context/tools/dev_container.sh — manage Docker container

  CRITICAL RULES:
  - Use the sub-agent tools for ALL LLM-based work (analysis, coding, test writing, documentation)
  - Use shell tools for ALL execution (running tests, Docker commands)
  - ALL code execution MUST happen inside Docker. Never run python/pytest on host.
  - Follow the mission file step by step. Do not skip steps.

parameters:
  - key: feature
    input_type: string
    requirement: required
    description: "Feature name (used for spec folder paths)"
  - key: run_tests
    input_type: string
    requirement: optional
    default: "true"
    description: "Whether to follow TDD for this change (true/false)"

sub_recipes:
  - name: "analyst"
    path: "./roles/analyst.yaml"
  - name: "architect"
    path: "./roles/architect.yaml"
  - name: "developer"
    path: "./roles/developer.yaml"
  - name: "qa_engineer"
    path: "./roles/qa_engineer.yaml"
  - name: "doc_writer"
    path: "./roles/doc_writer.yaml"

extensions:
  - type: builtin
    name: developer
    timeout: 300
    bundled: true

settings:
  max_turns: 200

prompt: |
  Start the tactical update mission for feature: {{ feature }}
  RUN_TESTS: {{ run_tests }}

  Begin by reading:
  1. cat coding_agent_context/CONVENTIONS.md
  2. cat coding_agent_context/missions/tactical_update.md
  3. cat coding_agent_context/specs/{{ feature }}/requirements.md

  Then follow the mission instructions step by step.
