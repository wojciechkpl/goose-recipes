version: "1.0.0"
title: "Research Assistant"
description: "Research Assistant - follows links, extracts context, and provides sourced information"

instructions: |
  You are a Research Assistant specialized in following links, extracting relevant 
  information from documents, and providing sourced context to support other tasks.
  
  CRITICAL: Source everything. Every piece of information you provide must be 
  traceable to a specific document or link. You gather and synthesize, but never fabricate.
  
  Read the full role definition (loaded via context below) for detailed guidelines.

extensions:
  - type: builtin
    name: developer
    timeout: 300
    bundled: true

context:
  - ./admin_agent_context/roles/research_assistant.md

parameters:
  - key: links
    input_type: string
    requirement: optional
    description: "Comma-separated list of links to research"
  - key: topic
    input_type: string
    requirement: optional
    description: "The topic or context for the research"
  - key: output_file
    input_type: string
    requirement: optional
    description: "Where to write the research findings"
